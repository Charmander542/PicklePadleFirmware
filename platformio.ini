; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; ESP-IDF rejects any path with spaces in FRAMEWORK_DIR or BUILD_DIR. With a
; Windows user folder like C:\Users\First Last\, packages live under that path
; and fail this check even if the project is in C:\PicklePaddle. On macOS, use
; the normal PlatformIO core directory (typically ~/.platformio) and do not set
; `core_dir` unless you have a custom install location.

[platformio]
;core_dir = C:/.platformio
; ESP-IDF's Python venv uses the same interpreter as PlatformIO Core. Python 3.14
; breaks ESP-IDF pip deps (pydantic-core). Install PIO on 3.11–3.13 and use it to build:
;   py -3.13 -m pip install -U platformio
;   py -3.13 -m platformio run
; If a previous build failed, delete ~/.platformio/penv/.espidf-4.4.7 once.
; Windows helper: scripts/fix-windows-pio-espidf.ps1 (picks 3.11–3.13, clears bad ESP-IDF venv, rebuilds).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino, espidf
; No microSD / boot loops on SD.begin(): add below to build_flags:
; build_flags = -D ENABLE_SD_FILE_LOG=0
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  adafruit/Adafruit BusIO
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit BNO055
  adafruit/Adafruit DRV2605 Library
  adafruit/Adafruit NeoPixel
extra_scripts = pre:extra_script.py

; Same as esp32dev but skips OLED self-test and boot probe screens/tests; goes straight to boot FX.
[env:esp32dev_prod]
extends = env:esp32dev
build_flags = -D PICKLE_PRODUCTION=1