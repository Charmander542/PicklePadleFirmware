; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; ESP-IDF rejects any path with spaces in FRAMEWORK_DIR or BUILD_DIR. With a
; Windows user folder like C:\Users\First Last\, packages live under that path
; and fail this check even if the project is in C:\PicklePaddel. core_dir must
; be space-free (create C:\.platformio once, or set PLATFORMIO_CORE_DIR user-wide).

[platformio]
core_dir = C:/.platformio

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino, espidf
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  adafruit/Adafruit BusIO
  adafruit/Adafruit DRV2605 Library
  adafruit/Adafruit NeoPixel
extra_scripts = pre:extra_script.py