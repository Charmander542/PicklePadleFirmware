; PlatformIO Project Configuration File — Central Node
;
; The central node is a bare ESP32 that bridges a PC (via USB serial) and all
; PicklePaddle nodes over ESP-NOW in a star topology.
; No display, IMU, haptics, or SD card hardware is required; any ESP32 dev board works.
;
; Build & upload from this folder:
;   cd central_node
;   pio run -t upload
;   pio device monitor
;
; See the top-level platformio.ini for Windows path-with-spaces notes (core_dir).

[platformio]
;core_dir = C:/.platformio

[env:central_node]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
