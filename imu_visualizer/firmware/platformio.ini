; Classic ESP32 (e.g. ESP32 Dev Module). For ESP32-S3, duplicate this env with
; board = esp32-s3-devkitc-1 and set I2C pins in include/pins.h (often 8/9).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  adafruit/Adafruit BusIO
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit BNO055